<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Expense Tracker</title>

    <link rel="stylesheet" href="style.css">

    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">

        <h1>Salary & Expense Tracker</h1>
        <p class="subtitle">Manage your salary and daily expenses easily</p>

        
        <div class="cards">

            <div class="card salary-card">
                <h3>Monthly Salary</h3>
                <p>₹<span id="totalSalary">0</span></p>
            </div>

            <div class="card expense-card">
                <h3>Total Spending</h3>
                <p>₹<span id="totalExpenses">0</span></p>
            </div>

            <div class="card balance-card">
                <h3>Available Balance</h3>
                <p id="balanceLine">₹<span id="remainingBalance">0</span></p>
                <p id="warningMessage"></p>
            </div>

        </div>

        
        <div class="box">
            <h2>Set Salary</h2>

            <input
                type="number"
                id="salaryInput"
                placeholder="Enter your monthly salary"
            >

            <button id="setSalaryBtn">Save Salary</button>
        </div>

        
        <div class="box">
            <h2>Add Expense</h2>

            <input
                type="text"
                id="expenseName"
                placeholder="Enter expense name"
            >

            <input
                type="number"
                id="expenseAmount"
                placeholder="Enter expense amount"
            >

            <button id="addExpenseBtn">Add Expense</button>
        </div>

        
        <div class="box">
            <h2>Expense List</h2>

            <ul id="expenseList">
            <li id="emptyMessage">No expenses added yet</li>
            </ul>
        </div>

        
        <div class="box">
            <h2>Expense Overview</h2>
            <canvas id="expenseChart"></canvas>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>s
